<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income - Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <h2>💰 ExpenseTracker</h2>
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="income.html" class="active">Income</a>
        <a href="expenses.html">Expenses</a>
        <a href="categories.html">Categories</a>
        <a href="budget.html">Budgets</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>

    <div class="main-content">
        <div class="header">
            <div>
                <h1>Income Management</h1>
                <p style="color: var(--text-muted); margin-top: 5px;">Record and view your incoming revenue streams.</p>
            </div>
            <button class="btn btn-success" onclick="openModal('incomeModal')">+ Add Income</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Source</th>
                        <th>Amount</th>
                        <th>Received Date</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="incomeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Record Income</h2>
                <button class="close-btn">&times;</button>
            </div>
            <form id="incomeForm">
                <input type="hidden" name="user_name" id="form-user-name">
                <div class="form-group">
                    <label>Source</label>
                    <input type="text" name="source" required placeholder="Salary, Freelance, Invest...">
                </div>
                <div class="form-group">
                    <label>Amount ($)</label>
                    <input type="number" step="0.01" name="amount" required>
                </div>
                <div class="form-group">
                    <label>Received Date</label>
                    <input type="date" name="received_date" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" rows="3"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-danger" onclick="closeModal('incomeModal')">Cancel</button>
                    <button type="submit" class="btn btn-success">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const userName = sessionStorage.getItem('user_name');
        document.getElementById('form-user-name').value = userName;

        async function loadData() {
            const data = await fetchData('/income/');
            const userData = data.filter(item => item.user_name === userName);
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            userData.forEach(item => {
                tbody.innerHTML += `
                    <tr>
                        <td>${item.income_id}</td>
                        <td>${item.source}</td>
                        <td class="income-val" style="font-weight:600">$${parseFloat(item.amount).toFixed(2)}</td>
                        <td>${item.received_date}</td>
                        <td>${item.description || '-'}</td>
                        <td>
                            <button class="btn btn-danger btn-small" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;" onclick="deleteData(${item.income_id})">Delete</button>
                        </td>
                    </tr>
                `;
            });
        }

        document.getElementById('incomeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            await postData('/income/add/', data);
            closeModal('incomeModal');
            e.target.reset();
            document.getElementById('form-user-name').value = userName;
            loadData();
        });

        async function deleteData(id) {
            if (confirm('Are you sure you want to delete this income record?')) {
                await postData(`/income/delete/${id}/`, {}, 'DELETE');
                loadData();
            }
        }

        loadData();
    </script>
</body>
</html>
