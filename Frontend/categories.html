<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories - Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <h2>💰 ExpenseTracker</h2>
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="income.html">Income</a>
        <a href="expenses.html">Expenses</a>
        <a href="categories.html" class="active">Categories</a>
        <a href="budget.html">Budgets</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>

    <div class="main-content">
        <div class="header">
            <div>
                <h1>Category Settings</h1>
                <p style="color: var(--text-muted); margin-top: 5px;">Define spending categories and monthly limits.</p>
            </div>
            <button class="btn btn-success" onclick="openModal('categoryModal')">+ Add Category</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Category Name</th>
                        <th>Monthly Limit</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="categoryModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add Category</h2>
                <button class="close-btn">&times;</button>
            </div>
            <form id="categoryForm">
                <div class="form-group">
                    <label>Category Name</label>
                    <input type="text" name="category_name" required placeholder="Food, Rent, Shopping...">
                </div>
                <div class="form-group">
                    <label>Monthly Limit ($)</label>
                    <input type="number" step="0.01" name="monthly_limit" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" rows="3"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-danger" onclick="closeModal('categoryModal')">Cancel</button>
                    <button type="submit" class="btn btn-success">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        async function loadData() {
            const data = await fetchData('/categories/');
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            data.forEach(item => {
                tbody.innerHTML += `
                    <tr>
                        <td>${item.category_id}</td>
                        <td><span style="font-weight:600; color:var(--primary-light)">${item.category_name}</span></td>
                        <td>$${parseFloat(item.monthly_limit).toFixed(2)}</td>
                        <td>${item.description || '-'}</td>
                        <td>
                            <button class="btn btn-danger btn-small" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;" onclick="deleteData(${item.category_id})">Delete</button>
                        </td>
                    </tr>
                `;
            });
        }

        document.getElementById('categoryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            await postData('/categories/add/', data);
            closeModal('categoryModal');
            e.target.reset();
            loadData();
        });

        async function deleteData(id) {
            if (confirm('Are you sure you want to delete this category?')) {
                await postData(`/categories/delete/${id}/`, {}, 'DELETE');
                loadData();
            }
        }

        loadData();
    </script>
</body>
</html>
