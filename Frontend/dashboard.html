<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <h2>💰 ExpenseTracker</h2>
        <a href="index.html">Home</a>
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="income.html">Income</a>
        <a href="expenses.html">Expenses</a>
        <a href="categories.html">Categories</a>
        <a href="budget.html">Budgets</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>

    <div class="main-content">
        <div class="header">
            <div>
                <h1>Dashboard Analytics</h1>
                <p style="color: var(--text-muted); margin-top: 5px;">Real-time statistics of your financial activity.</p>
            </div>
            <div>
                <span id="user-display" style="font-weight: 600; color: var(--primary-light);"></span>
            </div>
        </div>

        <div class="dashboard-cards">
            <div class="card">
                <h3>Total Income</h3>
                <div class="value income-val" id="total-income">$0.00</div>
            </div>
            <div class="card">
                <h3>Total Expenses</h3>
                <div class="value expense-val" id="total-expenses">$0.00</div>
            </div>
            <div class="card">
                <h3>Total Savings</h3>
                <div class="value" id="total-savings" style="color: var(--primary-light);">$0.00</div>
            </div>
        </div>

        <h2 style="margin-bottom: 1rem; font-weight: 700;">Recent Transactions</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Type</th>
                        <th>Category / Source</th>
                        <th>Amount</th>
                        <th>Description</th>
                    </tr>
                </thead>
                <tbody id="transaction-tbody"></tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById('user-display').textContent = `User: ${sessionStorage.getItem('user_name')}`;

        async function loadDashboard() {
            const userName = sessionStorage.getItem('user_name');
            
            // Get Incomes
            const incomes = await fetchData('/income/');
            const userIncomes = incomes.filter(i => i.user_name === userName);
            const totalInc = userIncomes.reduce((sum, item) => sum + parseFloat(item.amount), 0);
            document.getElementById('total-income').textContent = `$${totalInc.toFixed(2)}`;

            // Get Expenses
            const expenses = await fetchData('/expenses/');
            const userExpenses = expenses.filter(e => e.user_name === userName);
            const totalExp = userExpenses.reduce((sum, item) => sum + parseFloat(item.amount), 0);
            document.getElementById('total-expenses').textContent = `$${totalExp.toFixed(2)}`;

            // Calc Savings
            const savings = totalInc - totalExp;
            document.getElementById('total-savings').textContent = `$${savings.toFixed(2)}`;

            // Populate Recent Transactions (merged & sorted by date)
            const list = [];
            userIncomes.forEach(i => {
                list.push({ date: i.received_date, type: 'Income', ref: i.source, amount: `+$${parseFloat(i.amount).toFixed(2)}`, class: 'income-val', desc: i.description });
            });
            userExpenses.forEach(e => {
                list.push({ date: e.expense_date, type: 'Expense', ref: e.category, amount: `-$${parseFloat(e.amount).toFixed(2)}`, class: 'expense-val', desc: e.description });
            });

            // Sort by date descending
            list.sort((a, b) => new Date(b.date) - new Date(a.date));

            const tbody = document.getElementById('transaction-tbody');
            tbody.innerHTML = '';
            list.slice(0, 10).forEach(item => {
                tbody.innerHTML += `
                    <tr>
                        <td>${item.date}</td>
                        <td>${item.type}</td>
                        <td>${item.ref}</td>
                        <td class="${item.class}" style="font-weight:600">${item.amount}</td>
                        <td>${item.desc || '-'}</td>
                    </tr>
                `;
            });
        }
        loadDashboard();
    </script>
</body>
</html>
