<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses - Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <h2>💰 ExpenseTracker</h2>
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="income.html">Income</a>
        <a href="expenses.html" class="active">Expenses</a>
        <a href="categories.html">Categories</a>
        <a href="budget.html">Budgets</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>

    <div class="main-content">
        <div class="header">
            <div>
                <h1>Expense Management</h1>
                <p style="color: var(--text-muted); margin-top: 5px;">Monitor expenses and filter by spending categories.</p>
            </div>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <select id="category-filter" style="padding: 0.6rem; border-radius: 8px; background: var(--surface); color: white; border: 1px solid var(--border);" onchange="loadData()">
                    <option value="">All Categories</option>
                </select>
                <button class="btn btn-success" onclick="openModal('expenseModal')">+ Add Expense</button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Category</th>
                        <th>Amount</th>
                        <th>Expense Date</th>
                        <th>Payment Method</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="expenseModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Record Expense</h2>
                <button class="close-btn">&times;</button>
            </div>
            <form id="expenseForm">
                <input type="hidden" name="user_name" id="form-user-name">
                <div class="form-group">
                    <label>Category</label>
                    <select name="category" id="form-category-select" required></select>
                </div>
                <div class="form-group">
                    <label>Amount ($)</label>
                    <input type="number" step="0.01" name="amount" required>
                </div>
                <div class="form-group">
                    <label>Expense Date</label>
                    <input type="date" name="expense_date" required>
                </div>
                <div class="form-group">
                    <label>Payment Method</label>
                    <select name="payment_method">
                        <option>Cash</option>
                        <option>UPI</option>
                        <option>Debit Card</option>
                        <option>Credit Card</option>
                        <option>Net Banking</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" rows="3"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-danger" onclick="closeModal('expenseModal')">Cancel</button>
                    <button type="submit" class="btn btn-success">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const userName = sessionStorage.getItem('user_name');
        document.getElementById('form-user-name').value = userName;

        async function populateCategories() {
            const categories = await fetchData('/categories/');
            const filterSelect = document.getElementById('category-filter');
            const formSelect = document.getElementById('form-category-select');
            
            // Clear existing options
            filterSelect.innerHTML = '<option value="">All Categories</option>';
            formSelect.innerHTML = '';

            categories.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.category_name;
                opt.textContent = c.category_name;
                
                filterSelect.appendChild(opt.cloneNode(true));
                formSelect.appendChild(opt);
            });
        }

        async function loadData() {
            const data = await fetchData('/expenses/');
            const filterVal = document.getElementById('category-filter').value;
            
            let userData = data.filter(item => item.user_name === userName);
            if (filterVal) {
                userData = userData.filter(item => item.category === filterVal);
            }

            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            userData.forEach(item => {
                tbody.innerHTML += `
                    <tr>
                        <td>${item.expense_id}</td>
                        <td><span style="background:#475569; padding:4px 8px; border-radius:6px; font-size:0.85rem">${item.category}</span></td>
                        <td class="expense-val" style="font-weight:600">$${parseFloat(item.amount).toFixed(2)}</td>
                        <td>${item.expense_date}</td>
                        <td>${item.payment_method}</td>
                        <td>${item.description || '-'}</td>
                        <td>
                            <button class="btn btn-danger btn-small" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;" onclick="deleteData(${item.expense_id})">Delete</button>
                        </td>
                    </tr>
                `;
            });
        }

        document.getElementById('expenseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            await postData('/expenses/add/', data);
            closeModal('expenseModal');
            e.target.reset();
            document.getElementById('form-user-name').value = userName;
            loadData();
        });

        async function deleteData(id) {
            if (confirm('Are you sure you want to delete this expense record?')) {
                await postData(`/expenses/delete/${id}/`, {}, 'DELETE');
                loadData();
            }
        }

        async function init() {
            await populateCategories();
            await loadData();
        }
        init();
    </script>
</body>
</html>
